<!DOCTYPE html>
<html>

<head>

    <title>
        {% block title %}
        {% endblock %}
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="/dashboard">

            Smart Task Manager

        </a>

        <div>

            {% if session.get("user_id") %}

            <a href="/dashboard"
               class="btn btn-outline-light me-2">

                Dashboard

            </a>

            <a href="/logout"
               class="btn btn-danger">

                Logout

            </a>

            {% endif %}

        </div>

    </div>

</nav>

{% block content %}
{% endblock %}

</body>
</html>
