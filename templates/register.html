{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    Register
                </h2>

                <form method="POST">

                    <input type="email"
                           name="email"
                           class="form-control mb-3"
                           placeholder="Email">

                    <input type="text"
                           name="name"
                           class="form-control mb-3"
                           placeholder="Name"> 

                    <input type="password"
                           name="password"
                           class="form-control mb-3"
                           placeholder="Password">

                    <button 
                           type="submit"
                           class="btn btn-success w-100">
                        Register
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
