
<div class="container mt-5">

<div class="card p-4 shadow">

<h2>Edit Task</h2>

<form method="POST">

<input
type="text"
name="title"
value="{{task.title}}"
class="form-control mb-3">

<textarea
name="description"
class="form-control mb-3">{{task.description}}</textarea>

<select
name="priority"
class="form-control mb-3">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<select
name="status"
class="form-control mb-3">

<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>

</select>

<button
class="btn btn-success">

Update

</button>

</form>

</div>

</div>
