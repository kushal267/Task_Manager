
<div class="container mt-5">

<div class="card p-4 shadow">

<h2>Edit Task</h2>

<form method="POST">
 
<input
type="text"
name="title"
value="{{task.title}}"
class="form-control mb-3">

<textarea
name="description"
class="form-control mb-3">{{task.description}}</textarea>

<select
name="priority"
class="form-control mb-3">

<option {% if task.priority=="Low" %}selected{% endif %} >Low</option>
<option {% if task.priority=="Medium" %}selected{% endif %} >Medium</option>
<option {% if task.priority=="High" %}selected{% endif %} >High</option>

</select>

<select
name="status"
class="form-control mb-3">

<option {% if task.status=="Pending" %}selected{% endif %} >Pending</option>
<option {% if task.status=="In Progress" %}selected{% endif %} >In Progress</option>
<option {% if task.status=="Completed" %}selected{% endif %} >Completed</option>

</select>

<input
            type="date"
            name="due_date"
            value="{{task.due_date}}"
            class="form-control mb-3">
<button
class="btn btn-success">

Update Task

</button>

</form>

</div>

</div>
